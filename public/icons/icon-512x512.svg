<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  
  <!-- Magnifying Glass -->
  <circle cx="220" cy="220" r="100" fill="none" stroke="url(#accent)" stroke-width="28"/>
  <line x1="290" y1="290" x2="400" y2="400" stroke="url(#accent)" stroke-width="36" stroke-linecap="round"/>
  
  <!-- Document lines -->
  <line x1="150" y1="380" x2="362" y2="380" stroke="#4a4a6a" stroke-width="12" stroke-linecap="round"/>
  <line x1="150" y1="415" x2="280" y2="415" stroke="#4a4a6a" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Highlights -->
  <rect x="130" y="120" width="65" height="20" fill="#ffd93d" rx="4" opacity="0.8"/>
  <rect x="225" y="145" width="55" height="20" fill="#ff6b6b" rx="4" opacity="0.8"/>
  <rect x="150" y="170" width="45" height="20" fill="#6bcb77" rx="4" opacity="0.8"/>
</svg>
