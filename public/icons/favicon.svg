<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  
  <!-- Magnifying Glass -->
  <circle cx="13" cy="13" r="6" fill="none" stroke="url(#accent)" stroke-width="2"/>
  <line x1="17" y1="17" x2="24" y2="24" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Highlight -->
  <rect x="8" y="22" width="12" height="2" fill="#ffd93d" rx="1" opacity="0.8"/>
</svg>
